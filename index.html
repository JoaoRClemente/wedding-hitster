function PTBadge(){return<span style={{marginLeft:5,fontSize:9,background:"#0a2a18",color:"#22c97a",borderRadius:4,padding:"2px 6px",fontWeight:700,letterSpacing:1,verticalAlign:"middle"}}>PT</span>;}

function Btns({rating,setRating,dance,setDance,showDance}){
  return(
    <div style={{display:"flex",gap:6}}>
      {[["❤️","#ff2d55","rgba(255,45,85,0.15)"],["✓","#22c97a","rgba(34,201,122,0.15)"],["✗","#555","rgba(80,80,80,0.1)"]].map(([v,ac,bg])=>(
        <button key={v} onClick={()=>setRating(rating===v?"":v)} style={{minWidth:44,minHeight:44,border:rating===v?`2px solid ${ac}`:"1.5px solid #1e1e2e",background:rating===v?bg:"transparent",color:rating===v?ac:"#444",borderRadius:10,cursor:"pointer",fontSize:v==="❤️"?18:14,fontWeight:700,transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center"}}>{v}</button>
      ))}
      {showDance&&<button onClick={()=>setDance(d=>!d)} style={{minWidth:44,minHeight:44,border:dance?"2px solid #ffd700":"1.5px solid #1e1e2e",background:dance?"rgba(255,215,0,0.1)":"transparent",color:dance?"#ffd700":"#333",borderRadius:10,cursor:"pointer",fontSize:17,transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center"}}>💍</button>}
    </div>
  );
}

function SongCard({song,index}){
  const[revealed,setRevealed]=useState(false);
  const[rating,setRating]=useState("");
  const[dance,setDance]=useState(false);
  const[notes,setNotes]=useState("");
  const bc=rating==="❤️"?"rgba(255,45,85,0.3)":rating==="✓"?"rgba(34,201,122,0.3)":"rgba(255,255,255,0.05)";
  const bg=rating==="❤️"?"linear-gradient(135deg,#160409,#1e0810)":rating==="✓"?"linear-gradient(135deg,#040f09,#061410)":"linear-gradient(135deg,#0d0d18,#11111c)";
  return(
    <div style={{background:bg,border:`1.5px solid ${bc}`,borderRadius:14,padding:"13px",display:"flex",gap:11,transition:"all 0.3s"}}>
      <div style={{color:"#5a5470",fontSize:10,fontFamily:"monospace",minWidth:16,paddingTop:2}}>{String(index+1).padStart(2,"0")}</div>
      <a href={spotifyUrl(song.id)} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flexShrink:0}}>
        <div style={{width:66,height:66,background:"#fff",borderRadius:8,overflow:"hidden"}}>
          <img src={qrUrl(song.id)} width={66} height={66} alt="QR" style={{display:"block"}} loading="lazy"/>
        </div>
        <div style={{textAlign:"center",fontSize:9,color:"#a09ab8",marginTop:2}}>▶ spotify</div>
      </a>
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:7}}>
        <div onClick={()=>setRevealed(r=>!r)} style={{cursor:"pointer",userSelect:"none"}}>
          {revealed
            ?<div><div style={{fontSize:14,fontWeight:700,color:"#ede8ff",lineHeight:1.2,marginBottom:2}}>{song.title}{song.pt&&<PTBadge/>}</div><div style={{fontSize:11,color:"#9a92b0",fontWeight:300}}>{song.artist}</div></div>
            :<div style={{background:"linear-gradient(90deg,#6d28d9,#db2777,#2563eb)",borderRadius:8,padding:"9px 12px",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14}}>🎵</span><div><div style={{fontSize:11,fontWeight:700,color:"#fff",letterSpacing:1.5,textTransform:"uppercase"}}>Toca e descobre</div><div style={{fontSize:9,color:"rgba(255,255,255,0.55)",marginTop:1}}>toca para revelar</div></div></div>
          }
        </div>
        <Btns rating={rating} setRating={setRating} dance={dance} setDance={setDance} showDance={true}/>
        <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="notas..."/>
      </div>
    </div>
  );
}

function MedleyCard({medley}){
  const[rating,setRating]=useState("");
  const[notes,setNotes]=useState("");
  const bc=rating==="❤️"?"rgba(255,45,85,0.35)":rating==="✓"?"rgba(34,201,122,0.35)":"rgba(255,200,0,0.12)";
  const bg=rating==="❤️"?"linear-gradient(135deg,#160409,#1e0810)":rating==="✓"?"linear-gradient(135deg,#040f09,#061410)":"linear-gradient(135deg,#0e0e1c,#111120)";
  const first=medley.songs[0];
  return(
    <div style={{background:bg,border:`1.5px solid ${bc}`,borderRadius:14,padding:"14px",transition:"all 0.3s"}}>
      <div style={{display:"flex",gap:11,marginBottom:11}}>
        <a href={spotifyUrl(first.id)} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",flexShrink:0}}>
          <div style={{width:66,height:66,background:"#fff",borderRadius:8,overflow:"hidden"}}>
            <img src={qrUrl(first.id)} width={66} height={66} alt="QR" style={{display:"block"}} loading="lazy"/>
          </div>
          <div style={{textAlign:"center",fontSize:9,color:"#a09ab8",marginTop:2}}>▶ início</div>
        </a>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5,flexWrap:"wrap"}}>
            <span style={{fontSize:8,background:"rgba(255,200,0,0.1)",color:"#ffd700",borderRadius:4,padding:"2px 7px",letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>{medley.songs.length} músicas</span>
            {medley.pt&&<PTBadge/>}
          </div>
          <div style={{fontSize:14,fontWeight:700,color:"#ede8ff",lineHeight:1.2,marginBottom:8}}>🎭 {medley.name}</div>
          <Btns rating={rating} setRating={setRating} showDance={false}/>
        </div>
      </div>
      <div style={{borderTop:"1px solid #1a1a28",paddingTop:9,marginBottom:9}}>
        {medley.songs.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"baseline",gap:7,marginBottom:4}}>
            <span style={{fontSize:9,color:"#6a6280",fontFamily:"monospace",minWidth:14}}>{i+1}.</span>
            <a href={spotifyUrl(s.id)} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#bbb4d8",fontWeight:500}}>{s.title}</span>
              <span style={{fontSize:10,color:"#8a82a0"}}>— {s.artist}</span>
              {s.pt&&<PTBadge/>}
            </a>
          </div>
        ))}
      </div>
      <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="notas sobre o medley..."/>
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("acoustic");
  const[mTab,setMTab]=useState("acoustic");
  const[guide,setGuide]=useState(false);
  const TABS=[{id:"acoustic",label:"🎻 Acústico",n:ACOUSTIC.length},{id:"band",label:"🎸 Banda",n:BAND.length},{id:"medleys",label:"🎭 Medleys",n:ACOUSTIC_MEDLEYS.length+BAND_MEDLEYS.length}];
  return(
    <div style={{minHeight:"100vh",background:"#080810",paddingBottom:60}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(160deg,#0b0b18,#100618,#0b0b18)",borderBottom:"1px solid #14142a",padding:"22px 18px 18px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-50,left:-50,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(109,40,217,0.18) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",top:-30,right:-30,width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,rgba(219,39,119,0.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{position:"relative"}}>
          <div className="bebas" style={{fontSize:54,lineHeight:1,background:"linear-gradient(90deg,#a855f7,#ec4899,#38bdf8,#22c97a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:2}}>HITSTER!</div>
          <div style={{fontSize:10,color:"#7c3aed",letterSpacing:4,textTransform:"uppercase",marginTop:1,fontWeight:600}}>Wedding Edition</div>
          <div style={{fontSize:13,color:"#7a6e90",fontStyle:"italic",marginTop:5}}>Cláudia &amp; João · 24 Julho 2026</div>
          <button onClick={()=>setGuide(g=>!g)} style={{marginTop:12,background:"transparent",border:"1px solid #1e1e2e",color:"#8a82a0",borderRadius:20,padding:"5px 15px",fontSize:10,cursor:"pointer",letterSpacing:0.5}}>
            {guide?"▲ fechar guia":"📋 como funciona"}
          </button>
        </div>
      </div>
      {/* GUIDE */}
      {guide&&<div style={{background:"#0b0b18",borderBottom:"1px solid #14142a",padding:"14px"}}>
        {[
          {i:"📱",t:"Scaneiam o QR Code",d:"Abre o Spotify directamente. Ouçam 60–90 segundos antes de votar."},
          {i:"🎵",t:"Revelam a música",d:"Toquem no bloco colorido para descobrir o nome — só depois de ouvir!"},
          {i:"🗳️",t:"Votam de forma independente",d:"❤️ Quero no casamento · ✓ Pode entrar · ✗ Não é para nós · 💍 1.ª Dança"},
          {i:"🎭",t:"Medleys = votação de bloco",d:"Ouçam a sequência completa e votem no conjunto, não em cada música."},
          {i:"🎂",t:"Entrada na escadaria de Vandelli",d:"Procurem uma música grandiosoa para descer a escadaria — algo que provoque reacção nos convidados."},
        ].map(({i,t,d})=>(
          <div key={t} style={{display:"flex",gap:10,marginBottom:8,background:"#0f0f1e",borderRadius:10,padding:"10px 12px",border:"1px solid #1a1a2a"}}>
            <span style={{fontSize:16,flexShrink:0}}>{i}</span>
            <div><div style={{fontSize:11,fontWeight:700,color:"#ccc4e4",marginBottom:2}}>{t}</div><div style={{fontSize:10,color:"#8a82a0",lineHeight:1.5}}>{d}</div></div>
          </div>
        ))}
      </div>}
      {/* TABS */}
      <div style={{display:"flex",background:"#0b0b18",borderBottom:"1px solid #14142a",padding:"0 10px",position:"sticky",top:0,zIndex:10}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",borderBottom:tab===t.id?"2.5px solid #a855f7":"2.5px solid transparent",color:tab===t.id?"#d0c0ff":"#8880a0",padding:"12px 2px",fontSize:11,fontWeight:tab===t.id?700:400,cursor:"pointer",transition:"all 0.2s",fontFamily:"'DM Sans',sans-serif"}}>
            {t.label}<span style={{marginLeft:4,fontSize:9,background:tab===t.id?"rgba(168,85,247,0.12)":"transparent",borderRadius:8,padding:"1px 5px",color:tab===t.id?"#a855f7":"#2a2a3a"}}>{t.n}</span>
          </button>
        ))}
      </div>
      {/* CONTENT */}
      <div style={{padding:"10px 12px 0"}}>
        <div style={{fontSize:9,color:"#5a5a7a",textTransform:"uppercase",letterSpacing:2,marginBottom:10,fontWeight:600}}>
          {tab==="acoustic"&&"Cocktail · Primeiras danças · Momentos íntimos"}
          {tab==="band"&&"Jantar · Festa · Pista de dança"}
          {tab==="medleys"&&"Sequências especiais · Votação por bloco"}
        </div>
        {tab==="acoustic"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>{ACOUSTIC.map((s,i)=><SongCard key={s.artist+s.title} song={s} index={i}/>)}</div>}
        {tab==="band"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>{BAND.map((s,i)=><SongCard key={s.artist+s.title} song={s} index={i}/>)}</div>}
        {tab==="medleys"&&<div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[{id:"acoustic",label:"🎻 Acústicos",n:ACOUSTIC_MEDLEYS.length},{id:"band",label:"🎸 Banda",n:BAND_MEDLEYS.length}].map(t=>(
              <button key={t.id} onClick={()=>setMTab(t.id)} style={{flex:1,background:mTab===t.id?"rgba(168,85,247,0.1)":"transparent",border:mTab===t.id?"1.5px solid rgba(168,85,247,0.35)":"1.5px solid #1a1a2a",color:mTab===t.id?"#c084fc":"#8880a0",borderRadius:10,padding:"10px 6px",fontSize:11,fontWeight:mTab===t.id?700:400,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                {t.label} <span style={{fontSize:9,opacity:0.6}}>({t.n})</span>
              </button>
            ))}
          </div>
          {mTab==="acoustic"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{ACOUSTIC_MEDLEYS.map(m=><MedleyCard key={m.name} medley={m}/>)}</div>}
          {mTab==="band"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{BAND_MEDLEYS.map(m=><MedleyCard key={m.name} medley={m}/>)}</div>}
        </div>}
      </div>
      {/* FOOTER */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(8,8,16,0.96)",backdropFilter:"blur(8px)",borderTop:"1px solid #14142a",padding:"7px 16px",display:"flex",justifyContent:"center",gap:14,fontSize:10}}>
        <span style={{color:"#ff2d55"}}>❤️ quero</span>
        <span style={{color:"#22c97a"}}>✓ pode</span>
        <span style={{color:"#8a82a0"}}>✗ não</span>
        <span style={{color:"#ffd700"}}>💍 1.ª dança</span>
        <span style={{background:"#0a2a18",color:"#22c97a",padding:"1px 5px",borderRadius:3,fontSize:9}}>PT</span>
      </div>
    </div>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
